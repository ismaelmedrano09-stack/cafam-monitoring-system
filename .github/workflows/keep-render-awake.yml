name: Keep Render API awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            --retry 2 --retry-delay 10 \
            https://cafam-monitoring-system.onrender.com/api/health
